<script>
const namespace = 'holdensblog';
const key = 'homepage';          

// Select the ad div
const adDiv = document.querySelector('.ad');

// Create a div to hold the view count
const viewDiv = document.createElement('div');
viewDiv.style.color = '#42a5f5';
viewDiv.style.marginTop = '5px';
viewDiv.style.fontSize = '0.9rem';
viewDiv.textContent = 'Website Visits: 0';
adDiv.appendChild(viewDiv);

// Increment the counter on page load
fetch(`https://api.countapi.xyz/hit/${namespace}/${key}`)
  .then(res => res.json())
  .then(data => {
    viewDiv.textContent = `Website Visits: ${data.value}`;
  })
  .catch(err => {
    console.error('CountAPI error:', err);
  });
</script>
