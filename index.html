<script>
document.addEventListener('DOMContentLoaded', () => {
  const namespace = 'holdenweber.com';
  const name = 'homepage';

  const adDiv = document.querySelector('.ad');
  if (!adDiv) return;

  // check if counter already exists
  let viewEl = adDiv.querySelector('.clean-counter');
  if (!viewEl) {
    viewEl = document.createElement('div');
    viewEl.className = 'clean-counter';
    viewEl.textContent = 'Loading views...';
    adDiv.appendChild(viewEl);
  }

  // increment and get count from CounterAPI
  fetch(`https://api.counterapi.dev/v1/${namespace}/${name}/up`)
    .then(res => res.json())
    .then(data => {
      if (data && data.count !== undefined) {
        viewEl.textContent = `Website Visits: ${data.count}`;
      } else {
        viewEl.textContent = 'Website Visits: N/A';
      }
    })
    .catch(err => {
      console.error('CounterAPI error:', err);
      viewEl.textContent = 'Website Visits: N/A';
    });
});
</script>

<style>

}

.clean-counter:hover {

}
